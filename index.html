<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Building Features Can AI Control?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f8f9fa;color:#333}
header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600}
.lang-sw{margin-left:auto;display:flex;gap:2px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.lang-sw button{padding:4px 12px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer}
.lang-sw button.active{background:rgba(255,255,255,.15);color:#ffd700}
.progress-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;overflow-x:auto}
.step-dot{padding:10px 14px;font-size:12px;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.step-dot:hover{color:#666}
.step-dot.active{color:#1a1a2e;border-bottom-color:#ffd700;font-weight:600}
.main{min-height:calc(100vh - 95px);display:flex;justify-content:center;padding:20px;overflow-y:auto}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;max-width:860px;width:100%}
.card h2{font-size:20px;margin-bottom:14px;color:#1a1a2e}
.card p,.card li{font-size:14px;line-height:1.9;color:#555;margin-bottom:10px}
.card .highlight{background:#fff8e1;border-left:4px solid #ffd700;padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:14px;line-height:1.8}
.card .try-it{background:#e8f5e9;border:1px solid #c8e6c9;border-radius:8px;padding:12px 16px;margin:14px 0;font-size:13px;line-height:1.7}
.card .try-it b{color:#2e7d32}
.card .warn{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:12px 16px;margin:14px 0;font-size:13px;line-height:1.7}
.badge-c{background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.badge-a{background:#fff8e1;color:#f57f17;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.badge-u{background:#ffebee;color:#c62828;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.bar-row:hover{background:#f5f5f5}
.bar-row.selected{background:#e3f2fd}
.bar-label{width:140px;text-align:right;font-size:12px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:24px;background:#f0f0f0;border-radius:4px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.bar-val{width:60px;font-weight:700;color:#333;font-size:12px;text-align:right}
.prop-detail{background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin:12px 0;font-size:13px;line-height:1.8}
.prop-detail h3{font-size:15px;margin-bottom:8px}
.figure-container{margin:16px 0;text-align:center}
.figure-container img{max-width:100%;border-radius:8px;border:1px solid #e0e0e0}
.figure-caption{font-size:12px;color:#888;margin-top:6px;line-height:1.6}
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:14px 0}
.prop-card{border:1px solid #e0e0e0;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.prop-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);transform:translateY(-2px)}
.prop-card.active{border-color:#1a1a2e;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.prop-card .prop-icon{font-size:28px;margin-bottom:6px}
.prop-card .prop-name{font-size:13px;font-weight:600;color:#1a1a2e}
.prop-card .prop-desc{font-size:11px;color:#888;margin-top:4px}
.scatter-wrap{text-align:center;margin:14px 0}
.scatter-wrap canvas{border:1px solid #e0e0e0;border-radius:8px;background:#fff;max-width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@media(max-width:600px){
  header{padding:10px 16px}
  header h1{font-size:14px}
  .bar-label{width:70px;font-size:10px}
  .bar-val{width:44px;font-size:11px}
  .prop-grid{grid-template-columns:repeat(2,1fr)}
  .prop-card{padding:10px}
  .prop-card .prop-icon{font-size:22px}
  .card{padding:18px 16px}
  .card h2{font-size:17px}
  .scatter-wrap canvas{max-width:100%;height:auto}
  .progress-bar{padding:0 8px}
  .step-dot{padding:8px 10px;font-size:11px}
}
</style>
</head>
<body>

<header>
  <h1 id="headerTitle">Which Building Features Can AI Control?</h1>
  <div class="lang-sw">
    <button data-lang="zh">中文</button>
    <button class="active" data-lang="en">EN</button>
  </div>
</header>

<div class="progress-bar" id="progressBar"></div>

<div class="main">
  <div id="vizArea"></div>
</div>

<script>
let lang = 'en';

const L = {
en: {
  html_title: 'Which Building Features Can AI Control?',
  header_title: 'Which Building Features Can AI Control?',
  steps: [
    '① The Question',
    '② 14 Building Features',
    '③ Three Zones',
    '④ Predicting the Zones',
    '⑤ Why Some Features Fail',
    '⑥ Takeaways',
  ],

  // Step 0
  s0_title: 'Can AI Follow Building Instructions?',
  s0_p1: 'Imagine telling an AI: <b>"Build me a tall, left-right-symmetric Minecraft house."</b>',
  s0_p2: 'The AI makes it taller. The symmetry improves a bit. But the inside is completely solid, with no rooms at all.',
  s0_p3: 'Some instructions work, others don\'t. We wanted to know which ones work, and what determines that.',
  s0_p4: 'We trained a neural network (a computer program that learns patterns from examples) on <b>10,310 Minecraft buildings</b>. After training, we asked it to generate new buildings while following specific instructions. We then measured 14 building features to see which ones the AI responds to.',
  s0_p5: 'The neural network has no special design for any particular feature. It has to pick up every pattern from the training data alone.',
  s0_highlight: 'If you have an AI that generates buildings and a list of features you want to control, which features will the AI learn to follow? Can you predict this from the training data, without running experiments?',

  // Step 1
  s1_title: 'The 14 Building Features We Measured',
  s1_p1: 'Every building the AI generates gets measured on 14 features. Four of them have a <b>direct instruction</b>: we can explicitly tell the AI "make this feature high" or "make this feature low." The other ten have <b>no direct instruction</b> and can only change indirectly, as a byproduct of changing some directly-instructed feature. Click each card to learn more:',
  s1_click: 'Click a card above to see its description.',
  s1_direct_label: 'Has direct instruction',
  s1_indirect_label: 'No direct instruction',

  // Step 2
  s2_title: 'Three Zones: How Well Does the AI Respond?',
  s2_p1: 'For each feature, we compared buildings generated <b>with</b> a targeted instruction to buildings generated <b>without</b> any instruction. The "controllability" percentage tells you how much the feature shifted relative to the no-instruction baseline:',
  s2_formula: '<b>Controllability = (value with instruction − baseline) / baseline × 100%</b>',
  s2_example: 'Example: buildings without instructions average 10 blocks tall. With a "tall" instruction, the average jumps to 36.6. That\'s (36.6 − 10) / 10 = <b>266%</b> shift.',
  s2_p2: 'Based on how much they shift, the 14 features land in three zones:',
  s2_zone_c: '<span style="color:#2e7d32;font-weight:700">Green zone (>100% shift):</span> Strong response. The feature moved substantially.',
  s2_zone_a: '<span style="color:#f57f17;font-weight:700">Yellow zone (20~100%):</span> Weak but measurable response.',
  s2_zone_u: '<span style="color:#c62828;font-weight:700">Red zone (<20%):</span> Near-zero response. The instruction had little effect.',
  s2_p3: 'Click any bar to see details:',
  s2_samples_title: 'What does this look like?',
  s2_samples_caption: 'Each row is one instruction (top to bottom: no instruction, "be tall", "be large", "be symmetric", "be enclosed"). Four random buildings per row. Height and size produce clearly different outputs; enclosure barely changes.',

  // Step 3
  s3_title: 'Predicting the Zones from Training Data',
  s3_motivation: 'The experiments in Step ② took many GPU-hours per feature. If you are building your own AI generator and want to know which features will respond to instructions, running all those experiments from scratch is expensive. A shortcut would be useful: can we predict the result just by looking at the training data, before running any generation?',
  s3_p1: 'All 4 features with direct instructions land in the green zone. The remaining 10 features have no direct instruction, yet some still reach the green zone through indirect effects. Can we predict which zone they land in?',
  s3_p2: 'Yes, using two numbers you can calculate from the training data before any experiment:',
  s3_signal: '<b>Connection strength</b>: how closely this feature correlates with any directly-instructed feature. For example, "floor count" correlates strongly with "height" (0.765 out of 1), so when you ask for tall buildings, you tend to get more floors as a side effect.',
  s3_cv: '<b>Training variety</b>: how much this feature varies across the 10,310 training buildings. If almost all training buildings have similar hollowness, the AI never saw that feature change, so it never learned to control it.',
  s3_p3: 'Neither number alone predicts well. But multiply them together and the prediction gets much stronger:',
  s3_formula: 'Score = connection strength × min(training variety, 1)',
  s3_p3b: 'The min(x, 1) caps variety at 1. Beyond that, more variation stops helping, and capping keeps one outlier from skewing the score.',
  s3_p4: 'A feature needs <b>both</b> a connection to some instruction <b>and</b> enough training variation. If either is near zero, the product is near zero and the feature ends up poorly controlled. This multiplicative relationship is confirmed by the data:',
  s3_result: 'The correlation between this score and actual controllability is <b>0.879</b> on a 0-to-1 scale (1 = perfect prediction). Statistical testing gives p = 0.002: there is only a 0.2% chance of seeing a pattern this strong by luck alone.',
  s3_p5: 'The scatter plot below shows the 10 indirectly-controlled features. Each dot is one feature.',
  s3_scatter_guide: 'How to read this plot: the horizontal axis is the prediction score (higher = the model should learn this feature more easily). The vertical axis is the actual controllability measured from experiments. The colored bands in the background mark the three zones. If the prediction works, dots should trend from lower-left to upper-right.',
  s3_fig_caption: 'The product score (0.879) is a much stronger predictor than connection strength alone (0.624) or training variety alone (0.636).',
  s3_example_title: 'Examples',
  s3_hollowness: '<b>Hollowness</b>: moderate connection (0.31) but very low variety (0.23). The training buildings barely differed in hollowness, so the AI never learned to vary it.',
  s3_connected: '<b>Connected parts</b>: high variety (1.44) but almost no connection (0.09). The training data varies widely here, but none of the available instructions affect this feature.',

  // Step 4
  s4_title: 'Why Some Features Fail',
  s4_intro: 'We now know which features don\'t respond. The next step is figuring out <i>why</i>, because the fix depends on the cause.',
  s4_p1: 'There are two different reasons:',
  s4_type1_title: 'Not enough training examples',
  s4_type1: 'The neural network\'s internal structure can handle this feature, but the training data did not show enough variation for it to learn.',
  s4_type1_fix: 'What to do: collect more diverse training data, or raise the guidance scale when generating.',
  s4_type2_title: 'The network\'s structure cannot express it',
  s4_type2: 'The internal structure of the network is fundamentally unable to represent this feature. More training data will not help.',
  s4_type2_fix: 'What to do: redesign the network, or add a checking step after generation that corrects the output.',
  s4_p2: 'We can distinguish these by varying how strongly the AI follows instructions. The model has a parameter called <b>guidance scale</b> (labeled <b>s</b> in the buttons below) that controls instruction-following strength:',
  s4_cfg0: '<b>s = 0</b> (off): Instructions are ignored. The AI just generates a random building based on what it learned.',
  s4_cfg2: '<b>s = 2</b> (default): Standard instruction-following.',
  s4_cfg4: '<b>s = 4</b> (amplified): Instructions are followed more aggressively, but the generated buildings become less varied.',
  s4_p3: 'If a feature responds more strongly at higher guidance scales, the problem was training data. If the feature stays flat no matter the scale, the network\'s structure cannot handle it.',
  s4_p4: 'The chart below groups properties by their response pattern. Use the buttons to switch between guidance scales and watch how the bars change:',
  s4_pattern_strong: 'Already in green zone; stays green',
  s4_pattern_amplify: 'Crosses from yellow to green (limited by training data)',
  s4_pattern_amplify_nm: 'Responds, but drops at s=4 (too much guidance)',
  s4_pattern_plateau: 'Stays in yellow zone across all scales',
  s4_pattern_weak_up: 'Tiny steady increase; stays in red',
  s4_pattern_flat: 'Flat; no response to amplification',
  s4_fig_caption: 'Visual comparison at guidance scales 0, 2, and 4. "Enclosure" responds to amplification (data bottleneck). At scale 0, height outputs are scattered and uneven; at scale 4, height is tightly controlled but block-type diversity decreases.',
  s4_note: 'Note: 3 green-zone features (bounding box, vertical aspect, front-back symmetry) were not included because they take too long to calculate. Surface ratio shows 15% here (red) but 32% in the full experiment (yellow), because this smaller experiment did not include the instruction that most affects surface ratio.',

  // Step 5
  s5_title: 'Takeaways',
  s5_p1: 'For anyone building a system that generates structured content (game levels, 3D objects, floor plans):',
  s5_green: '<b>Green-zone features</b> respond well to standard instruction-following. No special handling needed.',
  s5_yellow: '<b>Yellow-zone features</b> are partially responsive. More diverse training data or a higher guidance scale may push them into the green zone.',
  s5_red: '<b>Red-zone features</b> do not respond to instruction-following at all. You will need to redesign part of the network, or add a checking step after generation that corrects the output.',
  s5_p2: 'The prediction score (connection strength × training variety) lets you estimate which zone a feature will land in <b>before training</b>. The guidance-scale experiment (Step ⑤) then tells you <b>why</b> a feature failed, so you know whether to collect more data or redesign the network.',
  s5_conclusion: 'Before running experiments, compute the prediction score from your training data. It helps separate features that will respond from those that need more data or a different network design.',
  s5_limit_title: 'Limitations',
  s5_limit: 'These results come from one neural network on one dataset. The correlation (0.879) is based on 10 data points and hasn\'t been tested on other systems yet. The part we expect to carry over is the <b>testing method</b> itself: map features into zones, then vary the guidance scale to find what\'s blocking each feature.',
},

zh: {
  html_title: 'AI能控制哪些建筑特征？',
  header_title: 'AI能控制哪些建筑特征？',
  steps: [
    '① 问题',

  s1_title: '我们测量的14种建筑特征',
  s1_p1: 'AI造出来的每栋建筑，我们都测了14种特征。其中4种有<b>直接指令</b>，可以明确跟AI说「把这个调高」或「把这个调低」。另外10种<b>没有直接指令</b>，只有在某个有指令的特征变化时，才可能跟着间接变化。点击卡片查看详情：',

  s2_formula: '<b>可控性 = (带指令时的值 − 基准值) / 基准值 × 100%</b>',

  s2_p2: '按变化幅度，14个特征落入三个区域：',
  s2_zone_c: '<span style="color:#2e7d32;font-weight:700">绿色区（变化超过100%）：</span>反应明显，特征大幅变动。',
  s2_zone_a: '<span style="color:#f57f17;font-weight:700">黄色区（20%~100%）：</span>有一定反应，但幅度不大。',
  s2_zone_u: '<span style="color:#c62828;font-weight:700">红色区（不到20%）：</span>几乎没有反应。',
  s2_p3: '点击任意一条查看详情：',
  s2_samples_title: '实际效果长什么样？',
  s2_samples_caption: '每行是一种指令（从上到下：无指令、「要高」、「要大」、「要对称」、「要封闭」），每行随机生成4栋建筑。高度和大小的指令效果明显；封闭性几乎没变化。',

  s3_title: '光看训练数据能预测区域吗',
  s3_motivation: '第②步的实验每个特征都要跑好几小时。如果你要搭自己的AI生成器，想知道哪些特征能控制，从头跑一遍实验太费时间。要是能光看训练数据就提前判断结果，就省事多了。',
  s3_p1: '4个有直接指令的特征全在绿色区。剩下10个没有直接指令，但其中一些也通过间接影响到了绿色区。这10个的区域能提前预测吗？',
  s3_p2: '可以。只需要训练数据里的两个数字：',
  s3_signal: '<b>关联强度</b>：这个特征和某个有直接指令的特征有多大的统计相关性。比如「楼层数」和「高度」的相关性是0.765（很强），所以要求造高楼时，楼层数也跟着多了。',

  bar.innerHTML = T('steps').map((s, i) =>
    `<div class="step-dot${i===currentStep?' active':''}" data-step="${i}">${s}</div>`

  bar.querySelectorAll('.step-dot').forEach(d =>

function drawScatter() {
  const canvas = document.getElementById('scatterCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:30, right:30, bottom:50, left:60};
  const pw = W - pad.left - pad.right, ph = H - pad.top - pad.bottom;
  ctx.clearRect(0, 0, W, H);

  const emergent = PROPERTIES.filter(p => !p.direct);
  const scores = emergent.map(p => p.eff * Math.min(p.cv, 1));
  const ctrls = emergent.map(p => p.ctrl);
  const maxScore = Math.max(...scores) * 1.15;
  const maxCtrl = Math.max(...ctrls) * 1.15;
  function toX(v) { return pad.left + (v / maxScore) * pw; }
  function toY(v) { return pad.top + ph - (v / maxCtrl) * ph; }

  // Grid
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) { const y = pad.top + (ph/5)*i; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke(); }

  // Zone backgrounds
  const y100 = toY(100), y20 = toY(20);
  ctx.fillStyle = 'rgba(244,67,54,0.05)'; ctx.fillRect(pad.left, y20, pw, pad.top+ph-y20);
  ctx.fillStyle = 'rgba(255,152,0,0.05)'; ctx.fillRect(pad.left, y100, pw, y20-y100);
  ctx.fillStyle = 'rgba(76,175,80,0.05)'; ctx.fillRect(pad.left, pad.top, pw, y100-pad.top);

  ctx.setLineDash([4,4]); ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.left,y100); ctx.lineTo(W-pad.right,y100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left,y20); ctx.lineTo(W-pad.right,y20); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('>100%', W-pad.right-45, y100-4);
  ctx.fillText('20~100%', W-pad.right-55, y20-4);
  ctx.fillText('<20%', W-pad.right-37, pad.top+ph-4);

  emergent.forEach((p, i) => {
    const x = toX(scores[i]), y = toY(ctrls[i]);
    ctx.fillStyle = barColor(p.regime);
    ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(propName(p.id), x, y - 12);
  });

  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,pad.top+ph); ctx.lineTo(W-pad.right,pad.top+ph); ctx.stroke();

  ctx.fillStyle='#333'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText(lang==='zh'?'预测分（关联 × min(多样性,1)）':'Score (connection × min(variety,1))', W/2, H-8);
  ctx.save(); ctx.translate(14, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(lang==='zh'?'可控性 (%)':'Controllability (%)', 0, 0);
  ctx.restore();

  ctx.font='10px sans-serif'; ctx.fillStyle='#666'; ctx.textAlign='center';
  for (let v = 0; v <= maxScore; v += 0.1) { if (v > maxScore) break; ctx.fillText(v.toFixed(1), toX(v), pad.top+ph+16); }
  ctx.textAlign='right';
  for (let v = 0; v <= maxCtrl; v += 100) ctx.fillText(v, pad.left-6, toY(v)+4);
}

function renderStep4() {

  document.getElementById('vizArea').innerHTML = `<div class="card fade-in">

      <label style="font-size:13px;margin-right:8px">${lang==='zh'?'引导强度：':'Guidance scale:'}</label>
      <button class="cfg-btn active" data-s="0" style="padding:4px 16px;border:2px solid #1a1a2e;border-radius:6px;margin:0 2px;cursor:pointer;background:#1a1a2e;color:#fff;font-weight:600">s = 0</button>
      <button class="cfg-btn" data-s="2" style="padding:4px 16px;border:2px solid #ddd;border-radius:6px;margin:0 2px;cursor:pointer;background:#fff;font-weight:600">s = 2</button>
      <button class="cfg-btn" data-s="4" style="padding:4px 16px;border:2px solid #ddd;border-radius:6px;margin:0 2px;cursor:pointer;background:#fff;font-weight:600">s = 4</button>
    </div>
    <p style="font-size:12px;color:#888;margin:8px 0">${T('s4_note')}</p>
    <div class="figure-container">

    </div>
    ${nextBtn()}
  </div>`;

  function renderCfgBars(scale) {
    let html = '';
    CFG_DATA.forEach(d => {
      const val = scale===0?d.s0:scale===2?d.s2:d.s4;
      const pct = Math.min(val/maxVal*100, 100);
      const color = val>100?'#4caf50':val>=20?'#ff9800':'#f44336';
      html += `<div class="bar-row" title="${cfgPatternLabel(d.pattern)}">
        <div class="bar-label">${propName(d.id)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="bar-val">${val}%</div>
        <div style="width:200px;font-size:11px;color:${cfgPatternColor(d.pattern)};overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${cfgPatternLabel(d.pattern)}</div>
      </div>`;
    });
    document.getElementById('cfgViz').innerHTML = html;
  }

  renderCfgBars(0);

  document.querySelectorAll('.cfg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cfg-btn').forEach(b => { b.classList.remove('active'); b.style.background='#fff'; b.style.color='#333'; b.style.borderColor='#ddd'; });
      btn.classList.add('active'); btn.style.background='#1a1a2e'; btn.style.color='#fff'; btn.style.borderColor='#1a1a2e';
      renderCfgBars(+btn.dataset.s);
    });
  });
}
